<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻辣红包中餐智能数据大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: url('resources/output.gif') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1vh 1.5vw;
            max-width: 1920px;
            margin: 0 auto;
        }

        /* 顶部标题区 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8vh;
            margin-top: 2vh;
            flex-shrink: 0;
            padding: 0 0.5vw;
            padding-bottom: 1vh;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.8vw;
        }

        .weather-info {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.6rem;
        }

        .header-center {
            margin-top: 40px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .header h1 {
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 2px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: 12px;
            margin-bottom: 1vh;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .nav-tab {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 6px;
            padding: 0.6vh 1.5vw;
            color: white;
            font-size: 1.6rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-tab.active {
            background: rgba(200, 16, 46, 0.9);
            border-color: rgba(255, 215, 0, 0.5);
        }

        .header-right {
            color: white;
            font-size: 1.8rem;
            font-weight: 500;
        }

        /* 主内容区域 - 左中右三栏 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.8fr 1fr;
            gap: 1.2vw;
            flex: 1;
            min-height: 0;
        }

        /* 三列容器 */
        .column {
            display: flex;
            flex-direction: column;
            gap: 1.2vh;
            min-height: 0;
        }

        /* 玻璃卡片 - 透明背景 */
        .glass-card {
            background: transparent;
            border-radius: 6px;
            padding: 1.2vh 1vw;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: rgba(235, 197, 135, 0.95);
            margin-bottom: 1vh;
            padding-left: 12px;
            border-left: 4px solid rgba(235, 197, 135, 1);
            flex-shrink: 0;
        }

        /* 菜品展示 - 左侧顶部 */
        .dish-display {
            flex: 1;
            background: linear-gradient(135deg, #FFF 0%, #F8F8F8 100%);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 120px;
            position: relative;
        }
        
        .dish-display img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
            transition: opacity 1.5s ease-in-out;
        }
        
        .dish-display img.visible {
            opacity: 1;
        }
        
        .dish-display img.hidden {
            opacity: 0;
        }

        .dish-display .dish-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FF8C42 0%, #FF6B6B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
        }

        .dish-name {
            text-align: center;
            font-weight: 600;
            color: #333;
            font-size: 0.8rem;
            margin-top: 0.3vh;
            flex-shrink: 0;
        }

        /* 图表容器 */
        .chart-container {
            flex: 1;
            min-height: 150px;
            border-radius: 4px;
        }

        /* 配方总数大数字 - 中间核心 */
        .big-number-container {
            border-radius: 8px;
            padding: 1.5vh 2vw;
            text-align: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .earth-bg {
            position: absolute;
            width: 180%;
            height: 180%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        @keyframes earthRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .big-number-label {
            font-size: 5rem;
            color: rgba(255, 255, 255, 0.95);
            margin: 0;
            position: relative;
            z-index: 10;
        }

        .big-number-value {
            font-size: 10rem;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.9), 0 0 50px rgba(255, 215, 0, 0.5);
            letter-spacing: 4px;
            position: relative;
            z-index: 1;
            margin: 1vh 0 0 0;
        }

        /* 菜品基础数据 - 中间顶部（列表形式） */
        .basic-data-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.4vh 1vw;
            flex-shrink: 0;
            border-radius: 4px;
            padding: 1vh 1vw;
        }

        .basic-data-item {
            display: flex;
            align-items: center;
            gap: 0.5vw;
        }

        .basic-data-label {
            color: rgba(235, 197, 135, 0.95);
            font-size: 1.4rem;
            white-space: nowrap;
        }

        .basic-data-value {
            color: #f7c600;
            font-size: 1.8rem;
            font-weight: 600;
        }

        /* 研发情况卡片 - 右侧顶部 */
        .research-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.4vw;
            flex-shrink: 0;
        }

        .research-card {
            border-radius: 6px;
            padding: 1vh 0.8vw;
            text-align: center;
            color: #ebc587f2;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .research-card .number {
            font-size: 2.2rem;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 0.3vh;
        }

        .research-card .label {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* 数据表格 */
        .data-table-wrapper {
            flex: 1;
            overflow: hidden;
            border-radius: 4px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            padding: 1vh 0.8vw;
            text-align: left;
            font-weight: 600;
            color: #ebc597f2;
            font-size: 1.2rem;
        }

        .data-table td {
            padding: 1.2vh 1vw;
            color: #ebc597f2;
            font-size: 1.1rem;
        }

        .data-table tr:hover {
            background: rgba(255, 215, 0, 0.05);
        }

        /* 场景分布和服务标识 - 左右布局 */
        .scene-service-wrapper {
            display: flex;
            gap: 1vw;
            flex: 1;
            min-height: 0;
        }

        .scene-chart-wrapper {
            flex: 1;
            min-height: 0;
        }

        .scene-chart-wrapper .chart-container {
            height: 100%;
        }

        .service-badge-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5vh;
            flex-shrink: 0;
            padding: 1vh;
        }

        .service-circle {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 215, 0, 0.5);
            font-weight: bold;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
            flex-shrink: 0;
        }

        .service-text {
            text-align: center;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.85);
        }

        .service-percent {
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
        }

        /* 刷新提示 */
        .refresh-tip {
            position: fixed;
            bottom: 12px;
            right: 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 8px 14px;
            color: white;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1000;
        }

        .refresh-dot {
            width: 6px;
            height: 6px;
            background: #00ff00;
            border-radius: 50%;
            animation: blink 1s ease-in-out infinite;
        }

        /* 全屏按钮 */
        .fullscreen-btn {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 4px;
            padding: 4px 12px;
            color: #FFD700;
            font-size: 0.9rem;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 215, 0, 0.4);
            border-color: rgba(255, 215, 0, 0.8);
        }

        .fullscreen-btn.hidden {
            display: none;
        }

        /* 奇数行 - 无背景（透明） */
        tbody tr:nth-child(odd) {
            background-color: rgba(255, 215, 0, 0.05);
        }

        /* 偶数行 - 有背景 */
        tbody tr:nth-child(even) {
            background-color: transparent;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 数据更新闪烁动画 */
        @keyframes dataFlash {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .data-flash {
            animation: dataFlash 0.3s ease;
        }

        /* 卡片更新高亮 */
        .card-update {
            animation: cardGlow 0.5s ease;
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 0 0 rgba(255, 215, 0, 0); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            100% { box-shadow: 0 0 0 rgba(255, 215, 0, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部标题区 -->
        <div class="header">

                <div class="weather-info" id="weatherInfo">🌧️ 小雨 | 16-20℃</div>

                <div class="nav-tabs">
                    <div class="nav-tab active">机器人酱料</div>
                    <div class="nav-tab">设备</div>
                    <div class="nav-tab">食材</div>

                </div>
            </div>
            <div class="header-right" id="datetime">2026.04.06 16:08:47</div>
        </div>

        <!-- 主内容区域 -->
        <div class="main-content">
            <!-- 左列 -->
            <div class="column">
                <div class="glass-card" style="flex:0.8;">
                    <div class="card-title" >菜品展示</div>
                    <div class="dish-display"  id="dishDisplay">
                        <div class="dish-placeholder">🍲</div>
                    </div>
                </div>
                <div class="glass-card" >
                    <div class="card-title">菜系分布</div>
                    <div class="chart-container" id="cuisineChart" style="height: 200px;"></div>

                <div class="glass-card" style="flex: 0.8;">
                    <div class="card-title">场景分布</div>
                    <div class="scene-service-wrapper">
                        <div class="scene-chart-wrapper">
                            <div class="chart-container" id="sceneChart"></div>
                        </div>
                        <div class="service-badge-wrapper">
                            <div class="service-circle">
                                <span class="service-percent">99%</span>
                            </div>
                            <div class="service-text">覆盖率</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 中列 -->
            <div class="column">
                <div class="glass-card">
                    <div class="card-title">菜品基础数据（本季度）</div>
                    <div class="basic-data-list" id="basicDataList">

                    </div>
                </div>
                <div class="glass-card big-number-container">
                    <p class="big-number-label">配方总数</p>
                    <p class="big-number-value" id="totalRecipes">0</p>
                </div>
                <div class="glass-card" style="flex: 1.2;">
                    <div class="card-title">每月新增配方数</div>
                    <div class="chart-container" id="trendChart"></div>
                </div>
            </div>

            <!-- 右列 -->
            <div class="column">
                <div class="glass-card">
                    <div class="card-title">每日研发菜品情况</div>
                    <div class="research-cards" id="researchCards">
                        <!-- 动态生成 -->
                    </div>
                </div>
                <div class="glass-card" style="flex: 1.2;">
                    <div class="card-title">展厅每日炒菜统计</div>
                    <div class="chart-container" id="dailyChart" style="height: 180px;"></div>
                </div>
                <div class="glass-card" style="flex: 0.8;">
                    <div class="card-title">中餐智能菜品</div>
                    <div class="data-table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>菜品名称</th>
                                    <th>累计研发次数</th>
                                    <th>研发中心</th>
                                </tr>
                            </thead>
                            <tbody id="dishesTableBody">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 刷新提示 -->
    <div class="refresh-tip">
        <div class="refresh-dot"></div>
        <span>每30秒自动刷新 | <span id="lastUpdate">16:08:47</span></span>
        <button id="fullscreenBtn" class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全屏</button>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            WEATHER_CITY: "眉山",
            REFRESH_INTERVAL: 30000, // 30秒全局刷新
            NUMBER_ANIMATION_DURATION: 2000 // 数字动画时长
        };

        // ==================== 数据 ====================
        // 动态生成过去12个月的月份名称
        function generateLast12Months() {
            const months = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            const result = [];
            const now = new Date();
            let currentMonth = now.getMonth(); // 0-11
            
            for (let i = 0; i < 12; i++) {
                result.push(months[currentMonth]);
                currentMonth = (currentMonth + 1) % 12;
            }
            
            return result;
        }
        
        // 动态生成过去7天的日期
        function generateLast7Days() {
            const result = [];
            const now = new Date();
            
            for (let i = 7; i >= 1; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                result.push(`${month}-${day}`);
            }
            
            return result;
        }
        
        let data = {
            basic: {
                计划中菜品: 569,
                本周研发: 289,
                已入库菜品: 1842,
                计划研发酱料: 1765,
                本周研发酱料: 387,
                已入库酱料: 3459,
                配方总数: 73629
            },
             cuisine: [
                { 菜系: "川菜", 比重: 30 },
                { 菜系: "湘菜", 比重: 26 },
                { 菜系: "江西小炒", 比重: 15 },
                { 菜系: "云南菜", 比重: 12 },
                { 菜系: "粤菜", 比重: 17 },
                { 菜系: "烧烤串串", 比重: 22 },
                { 菜系: "浙菜", 比重: 10 },
                { 菜系: "苏菜", 比重: 12 },
                { 菜系: "特色粉面", 比重: 18 },
                { 菜系: "闽菜", 比重: 8 },
                { 菜系: "鲁菜", 比重: 6 },
                { 菜系: "浇头盖饭", 比重: 15 },
                { 菜系: "徽菜", 比重: 5 },
                { 菜系: "江湖菜", 比重: 10 },
                { 菜系: "新疆风味", 比重: 12 },
                { 菜系: "东北炖菜", 比重: 10 },
                { 菜系: "西北面食", 比重: 8 },
                { 菜系: "海鲜烹饪", 比重: 6 },
                { 菜系: "创意融合菜", 比重: 5 }
            ],
            scene: [
                { 场景: "团餐场景", 人数: 5 },
                { 场景: "酒店场景", 人数: 4 },
                { 场景: "正餐场景", 人数: 3 },
                { 场景: "快餐场景", 人数: 2 },
                { 场景: "小吃场景", 人数: 1 }
            ],
            research: {
                今日研发: 43,
                昨日研发: 32,
                今日上架: 9,
                昨日上架: 11
            },
            daily: [], // 将由 generateLast7Days 动态生成
            dishes: [
                { 名称: "油渣白菜", 次数: 782, 中心: "中餐智能展厅" },
                { 名称: "麻婆豆腐", 次数: 823, 中心: "中餐智能展厅" },
                { 名称: "鱼香肉丝", 次数: 591, 中心: "中餐智能展厅" },
                { 名称: "小炒黄牛肉", 次数: 581, 中心: "中餐智能展厅" },
                { 名称: "葱烧海参", 次数: 593, 中心: "中餐智能展厅" },
                { 名称: "宫保鸡丁", 次数: 375, 中心: "中餐智能展厅" }
            ],
            trend: [] // 将由 generateLast12Months 动态生成
        };
        
        // 初始化动态数据
        function initDynamicData() {
            // 生成过去7天数据
            const dates = generateLast7Days();
            data.daily = dates.map(date => ({
                日期: date,
                次数: Math.floor(Math.random() * 50) + 50 // 50-100随机数
            }));
            
            // 生成过去12个月数据
            const months = generateLast12Months();
            data.trend = months.map(month => ({
                月份: month,
                月新增: Math.floor(Math.random() * 800) + 800, // 800-1600随机数
                趋势: Math.floor(Math.random() * 800) + 600 // 600-1400随机数
            }));
        }

        // 存储当前显示的数值（用于动画）
        let currentValues = {
            计划中菜品: 0,
            本周研发: 0,
            已入库菜品: 0,
            计划研发酱料: 0,
            本周研发酱料: 0,
            已入库酱料: 0,
            配方总数: 0,
            今日研发: 0,
            昨日研发: 0,
            今日上架: 0,
            昨日上架: 0
        };

        // ==================== 天气数据获取 ====================
        // 天气中英文映射
        const weatherTranslate = {
            'Clear': '晴',
            'Sunny': '晴',
            'Partly cloudy': '多云',

            'Patchy light drizzle': '小毛毛雨',
            'Light drizzle': '毛毛雨',
            'Freezing drizzle': '冻毛毛雨',
            'Heavy freezing drizzle': '大冻毛毛雨',
            'Patchy light rain': '小阵雨',
            'Light rain': '小雨',
            'Moderate rain at times': '时而有中雨',
            'Moderate rain': '中雨',
            'Heavy rain at times': '时而有大雨',
            'Heavy rain': '大雨',
            'Light freezing rain': '小冻雨',
            'Moderate or heavy freezing rain': '中到大冻雨',
            'Light sleet': '小雨夹雪',
            'Moderate or heavy sleet': '中到大雨夹雪',
            'Patchy light snow': '小阵雪',
            'Light snow': '小雪',
            'Patchy moderate snow': '局部中雪',
            'Moderate snow': '中雪',
            'Patchy heavy snow': '局部大雪',
            'Heavy snow': '大雪',

        async function fetchWeather() {
            try {
                // 使用wttr.in免费API（支持CORS，无需密钥）
                const weatherUrl = `https://wttr.in/${encodeURIComponent(CONFIG.WEATHER_CITY)}?format=j1&lang=zh`;
                const res = await fetch(weatherUrl);
                
                if (!res.ok) {
                    console.error('天气API请求失败');
                    return null;
                }
                
                const weatherData = await res.json();
                
                // wttr.in返回格式
                const current = weatherData.current_condition?.[0];
                if (current) {
                    const weatherText = current.weatherDesc?.[0]?.value || '未知';
                    return {
                        temp: current.temp_C,
                        text: weatherTranslate[weatherText] || weatherText,
                        feelsLike: current.FeelsLikeC
                    };
                }
                
                return null;
            } catch (error) {
                console.error('天气API调用失败:', error);
                return null;
            }
        }

        // 天气图标映射
        function getWeatherIcon(text) {
            const iconMap = {
                '晴': '☀️',
                '多云': '⛅',
                '阴': '☁️',
                '小雨': '🌧️',
                '中雨': '🌧️',
                '大雨': '🌧️',
                '暴雨': '⛈️',
                '雷阵雨': '⛈️',
                '小雪': '🌨️',
                '中雪': '🌨️',
                '大雪': '❄️',
                '雨夹雪': '🌨️',
                '雾': '🌫️',
                '霾': '🌫️',
                '风': '💨'
            };
            
            for (let key in iconMap) {
                if (text.includes(key)) return iconMap[key];
            }
            return '🌤️';
        }

        // 更新天气显示
        async function updateWeather() {
            const weatherInfo = document.getElementById('weatherInfo');
            const weather = await fetchWeather();
            
            if (weather) {
                const icon = getWeatherIcon(weather.text);
                const temp = `${weather.temp}℃`;
                weatherInfo.textContent = `${icon} ${weather.text} | ${temp}`;
                weatherInfo.classList.add('data-flash');
                setTimeout(() => weatherInfo.classList.remove('data-flash'), 300);
            } else {
                // API失败时使用模拟数据
                weatherInfo.textContent = '🌧️ 小雨 | 16-20℃';
            }
        }

        // ==================== 数字动画 ====================
        function animateNumber(element, target, duration = CONFIG.NUMBER_ANIMATION_DURATION) {
            const start = parseInt(element.textContent.replace(/,/g, '')) || 0;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (target - start) * easeOut);
                element.textContent = current.toLocaleString();
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        // 带闪烁效果的数字更新
        function updateNumberWithFlash(element, newValue, duration = CONFIG.NUMBER_ANIMATION_DURATION) {
            element.classList.add('data-flash');
            animateNumber(element, newValue, duration);
            setTimeout(() => element.classList.remove('data-flash'), 300);
        }

            const start = 0;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (target - start) * easeOut);
                element.textContent = current.toLocaleString() + unit;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        function updateDateTime() {
            const now = new Date();

                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            }).replace(/\//g, '.');
            
            document.getElementById('datetime').textContent = datetime;
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('zh-CN');

            'resources/6.png'
        ];
        
        let currentDishIndex = 0;
        let dishImagesLoaded = false;
        
        // 预加载所有图片
        function preloadDishImages() {
            const display = document.getElementById('dishDisplay');
            display.innerHTML = '';
            
            dishImages.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.alt = `菜品${index + 1}`;
                // 第一张可见，其他隐藏
                img.className = index === 0 ? 'visible' : 'hidden';
                img.onerror = function() {
                    this.style.display = 'none';
                };
                display.appendChild(img);
            });
            
            dishImagesLoaded = true;
        }
        
        // 淡入淡出切换
        function rotateDish() {
            if (!dishImagesLoaded) return;
            
            const display = document.getElementById('dishDisplay');
            const images = display.querySelectorAll('img');
            
            if (images.length === 0) return;
            
            // 当前图片淡出
            images[currentDishIndex].className = 'hidden';
            
            // 切换到下一张
            currentDishIndex = (currentDishIndex + 1) % dishImages.length;
            
            // 新图片淡入
            images[currentDishIndex].className = 'visible';
        }

        // ==================== 全屏功能 ====================
        function toggleFullscreen() {
            const elem = document.documentElement;
            
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                // 进入全屏
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
            } else {
                // 退出全屏
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        // 监听全屏状态变化
        function handleFullscreenChange() {
            const btn = document.getElementById('fullscreenBtn');
            const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
            
            if (isFullscreen) {
                btn.classList.add('hidden');
            } else {
                btn.classList.remove('hidden');
            }
        }

        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    </script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻辣红包中餐智能数据大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: url('resources/output.gif') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1vh 1.5vw;
            max-width: 1920px;
            margin: 0 auto;
        }

        /* 顶部标题区 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8vh;
            margin-top: 2vh;
            flex-shrink: 0;
            padding: 0 0.5vw;
            padding-bottom: 1vh;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.8vw;
        }

        .weather-info {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
        }

        .header-center {
            margin-top: 40px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 2px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: 8px;
            margin-bottom: 0.5vh;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .nav-tab {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            padding: 0.4vh 1vw;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-tab.active {
            background: rgba(200, 16, 46, 0.9);
            border-color: rgba(255, 215, 0, 0.5);
        }

        .header-right {
            color: white;
            font-size: 1rem;
            font-weight: 500;
        }

        /* 主内容区域 - 左中右三栏 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.8fr 1fr;
            gap: 1.2vw;
            flex: 1;
            min-height: 0;
        }

        /* 三列容器 */
        .column {
            display: flex;
            flex-direction: column;
            gap: 1.2vh;
            min-height: 0;
        }

        /* 玻璃卡片 - 透明背景 */
        .glass-card {
            background: transparent;
            border-radius: 6px;
            padding: 1.2vh 1vw;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(235, 197, 135, 0.95);
            margin-bottom: 0.6vh;
            padding-left: 8px;
            border-left: 3px solid rgba(235, 197, 135,1);
            flex-shrink: 0;
        }

        /* 菜品展示 - 左侧顶部 */
        .dish-display {
            flex: 1;
            background: linear-gradient(135deg, #FFF 0%, #F8F8F8 100%);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 120px;
            transition: opacity 0.3s ease;
        }

        .dish-display .dish-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FF8C42 0%, #FF6B6B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
        }

        .dish-name {
            text-align: center;
            font-weight: 600;
            color: #333;
            font-size: 0.8rem;
            margin-top: 0.3vh;
            flex-shrink: 0;
        }

        /* 图表容器 */
        .chart-container {
            flex: 1;
            min-height: 0;
            border-radius: 4px;
        }

        
        /* 配方总数大数字 - 中间核心 */
        .big-number-container {
            border-radius: 8px;
            padding: 1.5vh 2vw;
            text-align: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .earth-bg {
            position: absolute;
            width: 180%;
            height: 180%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        @keyframes earthRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .big-number-label {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.95);
            margin: 0;
            position: relative;
            z-index: 10;
        }

        .big-number-value {
            font-size: 6rem;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.9), 0 0 50px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            margin: 0.5vh 0 0 0;
        }

        /* 菜品基础数据 - 中间顶部（列表形式） */
        .basic-data-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.4vh 1vw;
            flex-shrink: 0;
            border-radius: 4px;
            padding: 1vh 1vw;
        }

        .basic-data-item {
            display: flex;
            align-items: center;
            gap: 0.5vw;
        }

        .basic-data-label {
             color: rgba(235, 197, 135, 0.95);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .basic-data-value {
            color: #f7c600;
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* 研发情况卡片 - 右侧顶部 */
        .research-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.4vw;
            flex-shrink: 0;
        }

        .research-card {
            border-radius: 4px;
            padding: 0.5vh 0.4vw;
            text-align: center;
            color: #ebc587f2;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .research-card .number {
            font-size: 1rem;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 0.1vh;
        }

        .research-card .label {
            font-size: 0.75rem;
            opacity: 0.9;
        }

        /* 数据表格 */
        .data-table-wrapper {
            flex: 1;
            overflow: hidden;
            border-radius: 4px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            padding: 0.5vh 0.4vw;
            text-align: left;
            font-weight: 600;
            color: #ebc597f2;
            box-shadow: #F8F8F8;
            font-size: 0.75rem;
        }

        .data-table td {
            padding: 1vh 0.5vw;
            color: #ebc597f2;
            font-size: 0.7rem;
        }

        .data-table tr:hover {
            background: rgba(255, 215, 0, 0.05);
        }

        /* 场景分布和服务标识 - 左右布局 */
        .scene-service-wrapper {
            display: flex;
            gap: 1vw;
            flex: 1;
            min-height: 0;
        }

        .scene-chart-wrapper {
            flex: 1;
            min-height: 0;
        }

        .scene-chart-wrapper .chart-container {
            height: 100%;
        }

        .service-badge-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5vh;
            flex-shrink: 0;
            padding: 1vh;
        }

        .service-circle {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 215, 0, 0.5);;
            font-weight: bold;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
            flex-shrink: 0;
        }

        .service-text {
            text-align: center;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.85);
        }

        .service-percent {
            font-size: 1rem;
            font-weight: bold;
            color: white;
        }

        /* 刷新提示 */
        .refresh-tip {
            position: fixed;
            bottom: 8px;
            right: 10px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            padding: 4px 8px;
            color: white;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 1000;
        }

        .refresh-dot {
            width: 4px;
            height: 4px;
            background: #00ff00;
            border-radius: 50%;
            animation: blink 1s ease-in-out infinite;
        }
        /* 奇数行 - 无背景（透明） */
        tbody tr:nth-child(odd) {
        background-color: rgba(255, 215, 0, 0.05);;
        
        }

        /* 偶数行 - 有背景 */
        tbody tr:nth-child(even) {
        background-color:transparent;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部标题区 -->
        <div class="header">
            <div class="header-left">
                <div class="weather-info">🌧️ 小雨 | 16-20℃</div>

                    <div class="nav-tab active">机器人酱料</div>
                    <div class="nav-tab">设备</div>
                    <div class="nav-tab">食材</div>
                    <div class="nav-tab">AI菜谱</div>
                </div>
            </div>
            <div class="header-right" id="datetime">2026.04.06 16:08:47</div>
        </div>

        <!-- 主内容区域 -->
        <div class="main-content">
            <!-- 左侧列 -->
            <div class="column">
                <div class="glass-card">
                    <div class="card-title">菜品展示</div>
                    <div class="dish-display" id="dishDisplay">
                       <img src="resources/1.png" alt="菜品展示" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;">
                    </div>
                </div>

                <div class="glass-card" style="flex: 1;">
                    <div class="card-title">菜系分布</div>
                    <div class="chart-container" id="cuisineChart"></div>
                </div>
                <div class="glass-card" style="flex: 1;">
                    <div class="card-title">场景分布</div>
                    <div class="scene-service-wrapper">

                            <div class="chart-container" id="sceneChart"></div>
                        </div>
                        <div class="service-badge-wrapper">
                            <div class="service-circle">
                                <span class="service-percent">99%</span>
                            </div>
                            <div class="service-text">覆盖率</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 中间列 -->
            <div class="column">
                 <!-- 菜品基础数据（本季度）- 列表形式 -->
                <div class="glass-card" style="flex: 0 0 0.5; padding: 1.2vh 1vw;">
                    <div class="card-title">菜品基础数据（本季度）</div>
                    <div class="basic-data-list" id="basicDataList">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 配方总数 -->
                <div class="big-number-container" style="flex:1; padding: 2vh 2vw; ">
                    <div class="big-number-label">配方总数</div>
                    <div class="big-number-value" id="totalRecipes">0</div>
                </div>

                <!-- 每月新增配方数 -->
                <div class="glass-card" style="flex: 0.7;">
                    <div class="card-title">每月新增配方数</div>
                    <div class="chart-container" id="trendChart"></div>
                </div>
            </div>

            <!-- 右侧列 -->
            <div class="column">
                <div class="glass-card">
                    <div class="card-title">每日研发菜品情况</div>
                    <div class="research-cards" id="researchCards">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <div class="glass-card" style="flex: 1;">
                    <div class="card-title">展厅每日炒菜统计</div>
                    <div class="chart-container" id="dailyChart"></div>
                </div>

                <div class="glass-card" style="flex: 1;">
                    <div class="card-title">中餐智能菜品</div>
                    <div class="data-table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>菜品名称</th>
                                    <th>累计研发次数</th>
                                    <th>研发中心</th>
                                </tr>
                            </thead>
                            <tbody id="dishesTableBody">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 刷新提示 -->
    <div class="refresh-tip">
        <div class="refresh-dot"></div>
        <span>每30秒自动刷新 | <span id="lastUpdate">16:08:47</span></span>
    </div>

    <script>
        // 数据
        const data = {
            basic: {
                计划中菜品: 569,
                本周研发: 289,
                已入库菜品: 1842,
                计划研发酱料: 1765,
                本周研发酱料: 387,
                已入库酱料: 3459,
                配方总数: 73629
            },
            cuisine: [
                { 菜系: "川菜", 比重: 30 },
                { 菜系: "湘菜", 比重: 26 },
                { 菜系: "江西小炒", 比重: 15 },
                { 菜系: "云南菜", 比重: 10 },
                { 菜系: "粤菜", 比重: 17 },
                { 菜系: "浙菜", 比重: 8 },
                { 菜系: "苏菜", 比重: 15 },

                { 菜系: "鲁菜", 比重: 4 },
                { 菜系: "徽菜", 比重: 5 }
            ],

                { 场景: "酒店场景", 人数: 4 },
                { 场景: "正餐场景", 人数: 3 },
                { 场景: "快餐场景", 人数: 2 },
                { 场景: "小吃场景", 人数: 1 }
            ],
            research: {
                今日研发: 43,
                昨日研发: 32,
                今日上架: 9,
                昨日上架: 11
            },
            daily: [
                { 日期: "01-18", 次数: 78 },
                { 日期: "01-19", 次数: 64 },
                { 日期: "01-20", 次数: 96 },
                { 日期: "01-21", 次数: 82 },
                { 日期: "01-22", 次数: 72 }
            ],
            dishes: [
                { 名称: "油渣白菜", 次数: 782, 中心: "中餐智能展厅" },
                { 名称: "麻婆豆腐", 次数: 823, 中心: "中餐智能展厅" },
                { 名称: "鱼香肉丝", 次数: 591, 中心: "中餐智能展厅" },
                { 名称: "小炒黄牛肉", 次数: 581, 中心: "中餐智能展厅" },
                { 名称: "葱烧海参", 次数: 593, 中心: "中餐智能展厅" },
                { 名称: "宫保鸡丁", 次数: 375, 中心: "中餐智能展厅" }
            ],
            trend: [
                { 月份: "一月", 月新增: 1359, 趋势: 810 },
                { 月份: "二月", 月新增: 1522, 趋势: 940 },
                { 月份: "三月", 月新增: 1007, 趋势: 1249 },
                { 月份: "四月", 月新增: 788, 趋势: 1102 },
                { 月份: "五月", 月新增: 910, 趋势: 1369 },
                { 月份: "六月", 月新增: 1158, 趋势: 1048 },
                { 月份: "七月", 月新增: 1433, 趋势: 666 },
                { 月份: "八月", 月新增: 888, 趋势: 708 },
                { 月份: "九月", 月新增: 725, 趋势: 1600 },
                { 月份: "十月", 月新增: 963, 趋势: 930 },
                { 月份: "十一月", 月新增: 1600, 趋势: 1052 },
                { 月份: "十二月", 月新增: 1693, 趋势: 983 }
            ]
        };

        // 初始化菜品基础数据列表
        function initBasicDataList() {
            const container = document.getElementById('basicDataList');
            const items = [
                { label: '计划中菜品', value: data.basic.计划中菜品, unit: '个' },
                { label: '本周研发', value: data.basic.本周研发, unit: '个' },
                { label: '已入库菜品', value: data.basic.已入库菜品, unit: '个' },
                { label: '计划研发专用酱料', value: data.basic.计划研发酱料, unit: '种' },
                { label: '本周研发专用酱料', value: data.basic.本周研发酱料, unit: '种' },
                { label: '已入库专用酱料', value: data.basic.已入库酱料, unit: '种' }
            ];
            
            container.innerHTML = items.map(item => `
                <div class="basic-data-item">
                    <span class="basic-data-label">${item.label}：</span>
                    <span class="basic-data-value">${item.value.toLocaleString()}${item.unit}</span>
                </div>
            `).join('');
        }

        // 数字动画
        function animateNumber(element, target) {
            const duration = 2000;
            const start = 0;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (target - start) * easeOut);
                element.textContent = current.toLocaleString();
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        // 研发卡片
        function initResearchCards() {
            const container = document.getElementById('researchCards');
            const cards = [
                { label: '今日研发菜品', value: data.research.今日研发 },
                { label: '今日上架菜品', value: data.research.今日上架 },
                { label: '昨日研发菜品', value: data.research.昨日研发 },
                { label: '昨日上架菜品', value: data.research.昨日上架 }
            ];
            
            container.innerHTML = cards.map(card => `
                <div class="research-card">
                    <div class="number">${card.value}</div>
                    <div class="label">${card.label}</div>
                </div>
            `).join('');
        }

        // 菜品表格
        function initDishesTable() {
            const tbody = document.getElementById('dishesTableBody');
            tbody.innerHTML = data.dishes.map(dish => `
                <tr>
                    <td>${dish.名称}</td>
                    <td>${dish.次数}</td>
                    <td>${dish.中心}</td>
                </tr>
            `).join('');
        }

        // 菜系分布图
        function initCuisineChart1() {
            const chart = echarts.init(document.getElementById('cuisineChart'));
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}: {d}%'
                },
                legend: {
                    orient: 'vertical',
                    right: '2%',
                    top: 'center',
                    textStyle: {
                        color: '#ffaa00',
                        fontSize: 10,
                        textShadowBlur: 8,
                        textShadowColor: 'rgba(255, 215, 0, 0.5)',
                        textBorderColor: 'rgba(255, 255, 255, 0.3)',
                        textBorderWidth: 2,
                    }
                },
                series: [{
                    type: 'pie',
                    radius: ['32%', '60%'],
                    center: ['32%', '50%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 2,
                        borderColor: '#fff',
                        borderWidth: 2,
                        background: rgba(255, 255, 255, 0.08)
                    },
                    label: {
                        show: true
                    },
                    emphasis: {
                        label: {
                            show: true,
                            fontSize: 9,
                            fontWeight: 'bold'
                        }
                    },
                    labelLine: {
                        show: true
                    },
                    data: data.cuisine.map((item, index) => ({
                        value: item.比重,
                        name: item.菜系,
                        itemStyle: {
                            color: ['#C8102E', '#FF6B6B', '#FFA500', '#FFD700', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'][index]
                        }
                    }))
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 菜系分布图 - 词云
        function initCuisineChart() {
            const chart = echarts.init(document.getElementById('cuisineChart'));
            const option = {
                series: [{
                    type: 'wordCloud',
                    shape: 'circle',
                    left: 'center',
                    top: 'center',
                    width: '90%',
                    height: '90%',
                    sizeRange: [14, 40],
                    rotationRange: [-30, 30],
                    rotationStep: 15,
                    gridSize: 8,
                    textStyle: {
                        fontFamily: 'PingFang SC, Microsoft YaHei',
                        fontWeight: 'bold',
                        color: function() {
                            const colors = ['#FFD700', '#FFA500', '#FF8C42', '#FF6B6B', '#C8102E', '#4ECDC4', '#ebc587', '#f7c600'];
                            return colors[Math.floor(Math.random() * colors.length)];
                        }
                    },
                    emphasis: {
                        textStyle: {
                            textShadowBlur: 10,
                            textShadowColor: '#FFD700'
                        }
                    },
                    data: data.cuisine.map(item => ({
                        name: item.菜系,
                        value: item.比重 * 10
                    }))
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 场景分布图
        function initSceneChart() {
            const chart = echarts.init(document.getElementById('sceneChart'));
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}: {c}'
                },
                series: [{
                    type: 'pie',
                    radius: '50%',
                    center: ['50%', '50%'],
                    itemStyle: {
                        borderRadius: 2,
                        borderColor: '#ffaa00',
                        borderWidth: 2
                    },
                    label: {
                        show: true,
                        formatter: '{b}\n{d}%',
                        fontSize: 10,
                        textStyle:{
                            color:'#ffaa00'
                        }
                    },
                    data: data.scene.map((item, index) => ({
                        value: item.人数,
                        name: item.场景,
                        itemStyle: {
                            color: ['#C8102E', '#FF6B6B', '#FFA500', '#FFD700', '#4ECDC4'][index]
                        }
                    }))
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 展厅每日炒菜统计
        function initDailyChart() {
            const chart = echarts.init(document.getElementById('dailyChart'));
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '6%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: data.daily.map(item => item.日期),
                    axisLine: {
                        lineStyle: {
                            color: '#ebc587f2'
                        }
                    },
                    axisLabel: {
                        color: '#ebc587f2',
                        fontSize: 10
                    }
                },
                yAxis: {
                    type: 'value',
                    axisLine: {
                        show: false
                    },
                    axisTick: {
                        show: false
                    },
                    splitLine: {
                        lineStyle: {
                            color: '#ebc587f2'
                        }
                    },
                    axisLabel: {
                        color: '#ebc587f2',
                        fontSize: 10
                    }
                },
                series: [{
                    type: 'bar',
                    data: data.daily.map(item => item.次数),
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#C8102E' },
                            { offset: 1, color: '#FF6B6B' }
                        ]),
                        borderRadius: [2, 2, 0, 0]
                    },
                    barWidth: '30%'
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 每月新增配方数
        function initTrendChart() {
            const chart = echarts.init(document.getElementById('trendChart'));
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    }
                },
                legend: {
                    data: ['月新增', '较往年趋势'],
                    top: 0,
                    textStyle: {
                        fontSize: 10,
                        color:'#ebc587f2'
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '14%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: data.trend.map(item => item.月份),
                    axisLine: {
                        lineStyle: {
                            color: '#ebc587f2'
                        }
                    },
                    axisLabel: {
                        color: '#ebc587f2',
                        fontSize: 8,
                        rotate: 20
                    }
                },
                yAxis: {
                    type: 'value',
                    axisLine: {
                        show: false
                    },
                    axisTick: {
                        show: false
                    },
                    splitLine: {
                        lineStyle: {
                            color: '#ebc587f2'
                        }
                    },
                    axisLabel: {
                        color: '#ebc587f2',
                        fontSize: 10,
                    }
                },
                series: [
                    {
                        name: '月新增',
                        type: 'bar',
                        data: data.trend.map(item => item.月新增),
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#FFD700' },
                                { offset: 1, color: '#FFD700' }
                            ]),
                            borderRadius: [2, 2, 0, 0]
                        },
                        barWidth: '25%'
                    },
                    {
                        name: '较往年趋势',
                        type: 'line',
                        data: data.trend.map(item => item.趋势),
                        smooth: true,
                        itemStyle: {
                            color: '#FFD700'
                        },
                        lineStyle: {
                            width: 2
                        },
                        symbol: 'circle',
                        symbolSize: 3
                    }
                ]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 更新时间
        function updateDateTime() {
            const now = new Date();
            const datetime = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            }).replace(/\//g, '.');
            
            document.getElementById('datetime').textContent = datetime;
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('zh-CN');
        }

        // 菜品轮播 - 使用真实图片
        const dishImages = [
            'resources/1.png',
            'resources/2.png',
            'resources/3.png',
            'resources/4.png',
            'resources/5.png',
            'resources/6.png',
        ];
        let currentDishIndex = 0;

        function rotateDish() {
            const display = document.getElementById('dishDisplay');
            
            display.style.opacity = '0';
            
            setTimeout(() => {
                currentDishIndex = (currentDishIndex + 1) % dishImages.length;
                display.innerHTML = `<img src="${dishImages[currentDishIndex]}" alt="菜品展示" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;">`;
                display.style.opacity = '1';
            }, 200);
        }

        // 初始化
        function init() {
            initBasicDataList();
            animateNumber(document.getElementById('totalRecipes'), data.basic.配方总数);
            initResearchCards();
            initDishesTable();
            initCuisineChart();
            initSceneChart();
            initDailyChart();
            initTrendChart();
            updateDateTime();
            
            // 定时更新
            setInterval(updateDateTime, 1000);
            setInterval(rotateDish, 5000);
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
